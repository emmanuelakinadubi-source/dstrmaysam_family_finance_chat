services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: family_finance_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: family_finance_ui
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"
