services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: family_finance_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
    depends_on:
      - db

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: family_finance_ui
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
    depends_on:
      - api

  db:
    image: postgres:16
    container_name: family_finance_db
    environment:
      POSTGRES_DB: family_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
