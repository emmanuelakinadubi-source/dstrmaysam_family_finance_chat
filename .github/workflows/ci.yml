name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Unit Tests (runs FIRST, gates everything else)
  #
  # These tests are fast and need no external services.
  # If any test fails here, the entire pipeline stops immediately.
  # ────────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run unit tests
        run: |
          cd api
          pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Lint (only runs if unit tests pass)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: unit-test          # <── blocked until unit-test succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check api/app

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Integration Tests (only runs if lint passes)
  # Needs PostgreSQL — slower than unit tests, kept separate.
  # ────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint               # <── blocked until lint succeeds

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: family_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/family_finance_test
      SECRET_KEY: ci-secret-key
      DEBUG: "true"
      AZURE_OPENAI_API_KEY: placeholder
      AZURE_OPENAI_ENDPOINT: https://placeholder.openai.azure.com
      AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
      AZURE_OPENAI_DEPLOYMENT: gpt-4.1-mini
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run database migrations
        run: |
          cd api
          alembic upgrade head

      - name: Run integration tests
        run: |
          cd api
          pytest --ignore=tests/ --tb=short -q

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Docker Build Check (only runs if all tests pass)
  # Confirms the Docker images build without errors before merge.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: integration-test   # <── blocked until integration tests succeed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: event-manager/api:ci

      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui/Dockerfile
          push: false
          tags: event-manager/ui:ci
