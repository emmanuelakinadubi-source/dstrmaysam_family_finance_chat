name: CI

on:
  push:
    branches: ['**']        # runs on every branch push
    paths-ignore:
      - '**.md'             # skip doc-only changes
      - '.env.example'
  pull_request:
    branches: [main]        # also runs when a PR targets main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check api/app

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: family_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/family_finance_test
      SECRET_KEY: ci-secret-key
      DEBUG: "true"
      AZURE_OPENAI_API_KEY: placeholder
      AZURE_OPENAI_ENDPOINT: https://placeholder.openai.azure.com
      AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
      AZURE_OPENAI_DEPLOYMENT: gpt-4.1-mini
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run migrations
        run: |
          cd api
          alembic upgrade head

      - name: Run tests
        run: |
          cd api
          pytest --tb=short -q

  build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: event-manager/api:ci

      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui/Dockerfile
          push: false
          tags: event-manager/ui:ci
